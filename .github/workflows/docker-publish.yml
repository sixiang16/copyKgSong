name: Build and Push Docker Image (copyKgSong)

on:
  push:
    branches: [ main ]      # 当你推送代码到 main 分支时自动触发
  workflow_dispatch:        # 允许你在 Actions 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sixiang16123/copykgsong:latest
            sixiang16123/copykgsong:${{ github.sha }}
